proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=bs_api:10m max_size=200m inactive=2m use_temp_path=off;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Blockscout API proxy
  # Fix 429 by:
  # - short shared cache
  # - not forwarding real client IP to upstream rate limiter
  location = /api/v2/stats {
    proxy_cache bs_api;
    proxy_cache_valid 200 10s;
    proxy_cache_lock on;

    proxy_ignore_headers Cache-Control Expires Set-Cookie;
    proxy_hide_header Set-Cookie;

    proxy_pass http://172.17.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP 127.0.0.1;
    proxy_set_header X-Forwarded-For 127.0.0.1;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header X-Cache $upstream_cache_status always;
  }

  location /api/ {
    proxy_cache bs_api;
    proxy_cache_valid 200 10s;
    proxy_cache_lock on;

    proxy_ignore_headers Cache-Control Expires Set-Cookie;
    proxy_hide_header Set-Cookie;

    proxy_pass http://172.17.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP 127.0.0.1;
    proxy_set_header X-Forwarded-For 127.0.0.1;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header X-Cache $upstream_cache_status always;
  }

  # geth JSON-RPC passthrough (head block, clique signer lookups).
  # Named /noderpc/ so it does NOT collide with the unified-entry nginx,
  # which reserves /rpc1/ for API-key-gated debug access — required for
  # serving this app as the default site on port 80.
  location /noderpc/ {
    proxy_pass http://139.180.188.61:8545/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Legacy path kept for old bundles / direct :3002 access.
  location /rpc1/ {
    proxy_pass http://139.180.188.61:8545/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
