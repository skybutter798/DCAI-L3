proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=bs_api:10m max_size=100m inactive=30s use_temp_path=off;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Blockscout API (same host)
  # Blockscout can rate-limit (429) if the UI polls aggressively.
  # We add a tiny nginx cache to de-duplicate bursts and protect upstream.
  location = /api/v2/stats {
    proxy_cache bs_api;
    proxy_cache_valid 200 10s;
    proxy_cache_lock on;
    proxy_pass http://172.17.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header X-Cache $upstream_cache_status always;
  }

  location /api/ {
    proxy_cache bs_api;
    proxy_cache_valid 200 2s;
    proxy_cache_lock on;
    proxy_pass http://172.17.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header X-Cache $upstream_cache_status always;
  }

  # RPC1 passthrough (for clique signer lookup)
  location /rpc1/ {
    proxy_pass http://139.180.188.61:8545/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
