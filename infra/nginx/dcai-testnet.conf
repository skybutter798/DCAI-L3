map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

map $http_x_api_key $rpc_key_ok {
  default 0;
  "<RPC_MASTER_KEY>" 1;
  "<RPC_MASTER_KEY_2>" 1;
}

include /etc/nginx/dcai-apikey-tiers.conf;


limit_req_zone $binary_remote_addr zone=rpc_rl:10m rate=10r/s;

upstream dcai_rpc_http {
  least_conn;
  # Foundation capacity remains the safe majority. The local contributor
  # router receives 2/(20+20+2) ~= 4.76% canary traffic and falls back to the
  # Foundation nodes itself whenever no verified contributor is healthy.
  server 139.180.188.61:8545 weight=20 max_fails=3 fail_timeout=10s;
  server 207.148.72.238:8545 weight=20 max_fails=3 fail_timeout=10s;
  server 127.0.0.1:3998 weight=2 max_fails=1 fail_timeout=5s;
}

upstream dcai_rpc_ws {
  least_conn;
  server 139.180.188.61:8546 max_fails=3 fail_timeout=10s;
  server 207.148.72.238:8546 max_fails=3 fail_timeout=10s;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name explorer.dcai.ai _;

  return 308 https://explorer.dcai.ai$request_uri;
}

server {
  include /etc/nginx/dcai-apikey-locations.conf;
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name explorer.dcai.ai;

  ssl_certificate /etc/letsencrypt/live/explorer.dcai.ai/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/explorer.dcai.ai/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  add_header Strict-Transport-Security "max-age=31536000" always;

  location = /admin {
    return 301 /admin/;
  }

  # Admin Dashboard (static)
  location /admin/ {
    auth_basic "DCAI Admin";
    auth_basic_user_file /etc/nginx/.htpasswd-dcai-admin;
    alias /var/www/html/admin/;
    index index.html;
    add_header Cache-Control "no-store";
  }

  # Admin API — public wallet-signed endpoints (EIP-191 signature verified by the
  # backend; intentionally NOT behind basic auth so the explorer key flows work)
  location = /admin/api/auth/nonce {
    proxy_pass http://127.0.0.1:3001/auth/nonce;
    proxy_set_header Host $host;
  }
  location = /admin/api/apikey/request {
    proxy_pass http://127.0.0.1:3001/apikey/request;
    proxy_set_header Host $host;
  }
  location = /admin/api/apikey/reveal {
    proxy_pass http://127.0.0.1:3001/apikey/reveal;
    proxy_set_header Host $host;
  }

  # Admin API
  location /admin/api/ {
    auth_basic "DCAI Admin";
    auth_basic_user_file /etc/nginx/.htpasswd-dcai-admin;
    proxy_pass http://127.0.0.1:3001/;
    proxy_set_header Host $host;
    proxy_set_header X-Admin-Token "<ADMIN_TOKEN>";
  }

  # Public featured-token catalogue. The admin API owns this persistent file,
  # so explorer image deployments cannot overwrite admin changes.
  location = /featured-tokens.json {
    alias /var/www/html/featured-tokens.json;
    default_type application/json;
    add_header Cache-Control "no-store";
  }

  # Internal mirror collector (for JSON-RPC method stats)
  location = /__rpc_mirror {
    internal;
    proxy_pass http://127.0.0.1:3999/ingest;
    proxy_set_header X-ApiKey $rpc_key;
    proxy_set_header X-Tier $rpc_tier;
    proxy_set_header Content-Type $http_content_type;
  }

  # Explorer UI (AuraScan; Blockscout frontend remains on :3000)
  location / {
    proxy_pass http://127.0.0.1:3002;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Faucet
  location /faucet/ {
    proxy_pass http://127.0.0.1:8080/;
  }

  # Rewards proofs (public static)
  location /rewards/ {
    alias /var/www/html/rewards/;
    add_header Cache-Control "no-store";
  }

  # Operator attribution routes (probe/ops)
  # New Contributor Program routes are generated atomically by admin-api.mjs.
  include /etc/nginx/dcai-operator-routes.conf;

  location ~ "^/op/contrib1/rpc/([0-9a-fA-F]{32})/" {
    set $path_key $1;
    if ($path_key != "<RPC_MASTER_KEY>") { return 401; }
    rewrite "^/op/contrib1/rpc/[0-9a-fA-F]{32}/(.*)$" /$1 break;
    proxy_pass http://207.148.119.180:8545;
  }

  location ~ "^/op/contrib2/rpc/([0-9a-fA-F]{32})/" {
    set $path_key $1;
    if ($path_key != "<RPC_MASTER_KEY>") { return 401; }
    rewrite "^/op/contrib2/rpc/[0-9a-fA-F]{32}/(.*)$" /$1 break;
    proxy_pass http://207.148.72.238:8545;
  }

  # Health
  location = /rpc/health {
    default_type application/json;
    return 200 "{ok:true}";
  }

  # --- HTTP RPC ---
  location /rpc/ {
    limit_req_status 429;
    mirror /__rpc_mirror;
    mirror_request_body on;
    set $rpc_tier legacy-header;
    set $rpc_key $http_x_api_key;
    access_log /var/log/nginx/rpc_access.log dcai_rpc_usage;
    if ($rpc_key_ok = 0) { return 401; }
    limit_req zone=rpc_rl burst=40 nodelay;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_pass http://dcai_rpc_http/;
  }

  location ~ "^/rpc/([0-9a-fA-F]{32})/" {
    limit_req_status 429;
    mirror /__rpc_mirror;
    mirror_request_body on;
    set $path_key $1;
    set $rpc_tier legacy-path;
    set $rpc_key $path_key;
    access_log /var/log/nginx/rpc_access.log dcai_rpc_usage;
    if ($path_key != "<RPC_MASTER_KEY>") { return 401; }
    limit_req zone=rpc_rl burst=40 nodelay;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    rewrite "^/rpc/[0-9a-fA-F]{32}/(.*)$" /$1 break;
    proxy_pass http://dcai_rpc_http;
  }

  # --- WS RPC ---
  location /ws/ {
    set $rpc_tier legacy-header;
    set $rpc_key $http_x_api_key;
    access_log /var/log/nginx/rpc_access.log dcai_rpc_usage;
    if ($rpc_key_ok = 0) { return 401; }
    limit_req zone=rpc_rl burst=40 nodelay;
    proxy_pass http://dcai_rpc_ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
  }

  location ~ "^/ws/([0-9a-fA-F]{32})/" {
    set $path_key $1;
    set $rpc_tier legacy-path;
    set $rpc_key $path_key;
    access_log /var/log/nginx/rpc_access.log dcai_rpc_usage;
    if ($path_key != "<RPC_MASTER_KEY>") { return 401; }
    limit_req zone=rpc_rl burst=40 nodelay;
    proxy_pass http://dcai_rpc_ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
  }

  # Direct debug (header gated)
  location /rpc1/ { if ($rpc_key_ok = 0) { return 401; } proxy_pass http://139.180.188.61:8545/; }
  location /rpc2/ { if ($rpc_key_ok = 0) { return 401; } proxy_pass http://207.148.72.238:8545/; }
  location /ws1/  { if ($rpc_key_ok = 0) { return 401; } proxy_pass http://139.180.188.61:8546; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }
  location /ws2/  { if ($rpc_key_ok = 0) { return 401; } proxy_pass http://207.148.72.238:8546; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }
}
