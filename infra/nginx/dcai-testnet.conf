map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Simple API key gate for RPC/WS
map $http_x_api_key $rpc_key_ok {
  default 0;
  'bcccf2781419331918a740c0d71c4643' 1;
}

limit_req_zone $binary_remote_addr zone=rpc_rl:10m rate=10r/s;

upstream dcai_rpc_http {
  least_conn;
  server 139.180.188.61:8545 max_fails=3 fail_timeout=10s;
  server 207.148.72.238:8545 max_fails=3 fail_timeout=10s;
}

upstream dcai_rpc_ws {
  least_conn;
  server 139.180.188.61:8546 max_fails=3 fail_timeout=10s;
  server 207.148.72.238:8546 max_fails=3 fail_timeout=10s;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;

  # Explorer UI (frontend)
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Faucet
  location /faucet/ {
    rewrite ^/faucet/?(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- RPC (production-ish) ---
  location = /rpc/health {
    default_type application/json;
    return 200 '{"ok":true}';
  }

  # Preferred HTTP RPC entry (auto failover)
  location ^~ /rpc {
    if ($rpc_key_ok = 0) { return 401; }
    limit_req zone=rpc_rl burst=40 nodelay;

    # JSON-RPC should be POST; allow GET for quick tests
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_pass http://dcai_rpc_http;
  }

  # Preferred WS RPC entry (auto failover)
  location ^~ /ws {
    if ($rpc_key_ok = 0) { return 401; }
    limit_req zone=rpc_rl burst=40 nodelay;

    proxy_pass http://dcai_rpc_ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
  }

  # Keep direct paths for debugging (still gated)
  location /rpc1/ {
    if ($rpc_key_ok = 0) { return 401; }
    limit_req zone=rpc_rl burst=40 nodelay;
    rewrite ^/rpc1/?(.*)$ /$1 break;
    proxy_pass http://139.180.188.61:8545;
  }
  location /rpc2/ {
    if ($rpc_key_ok = 0) { return 401; }
    limit_req zone=rpc_rl burst=40 nodelay;
    rewrite ^/rpc2/?(.*)$ /$1 break;
    proxy_pass http://207.148.72.238:8545;
  }

  location /ws1/ {
    if ($rpc_key_ok = 0) { return 401; }
    limit_req zone=rpc_rl burst=40 nodelay;
    rewrite ^/ws1/?(.*)$ /$1 break;
    proxy_pass http://139.180.188.61:8546;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
  }
  location /ws2/ {
    if ($rpc_key_ok = 0) { return 401; }
    limit_req zone=rpc_rl burst=40 nodelay;
    rewrite ^/ws2/?(.*)$ /$1 break;
    proxy_pass http://207.148.72.238:8546;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
  }
}
