# --- DCAI API key tiers (generated / managed by admin tooling) ---

# For tiered endpoints that embed the key in the URL path, we validate against these maps.
map $path_key $rpc_basic_ok {
  default 0;
  include /etc/nginx/rpc_keys_basic.conf;
}
map $path_key $rpc_pro_ok {
  default 0;
  include /etc/nginx/rpc_keys_pro.conf;
}
map $path_key $rpc_ultra_ok {
  default 0;
  include /etc/nginx/rpc_keys_ultra.conf;
}

# Per-key rate limiting (keyed by $path_key)
limit_req_zone $path_key zone=rpc_basic:10m rate=10r/s;
limit_req_zone $path_key zone=rpc_pro:10m rate=50r/s;
limit_req_zone $path_key zone=rpc_ultra:10m rate=200r/s;
