# --- Tiered HTTP RPC endpoints ---
location ~ "^/rpc/basic/([0-9a-fA-F]{32})/" {
  set $path_key $1;
  set $rpc_key $path_key;
  set $rpc_tier basic;
  access_log /var/log/nginx/rpc_access.log dcai_rpc_usage;
  if ($rpc_basic_ok = 0) { return 401; }
  limit_req_status 429;
  mirror /__rpc_mirror;
  mirror_request_body on;
  limit_req zone=rpc_basic burst=40 nodelay;
  proxy_next_upstream error timeout http_502 http_503 http_504;
  rewrite "^/rpc/basic/[0-9a-fA-F]{32}/(.*)$" /$1 break;
  proxy_pass http://dcai_rpc_http;
}

location ~ "^/rpc/pro/([0-9a-fA-F]{32})/" {
  set $path_key $1;
  set $rpc_key $path_key;
  set $rpc_tier pro;
  access_log /var/log/nginx/rpc_access.log dcai_rpc_usage;
