# --- Tiered WS RPC endpoints ---
location ~ "^/ws/basic/([0-9a-fA-F]{32})/" {
  set $path_key $1;
  set $rpc_key $path_key;
  set $rpc_tier basic-ws;
  access_log /var/log/nginx/rpc_access.log dcai_rpc_usage;
  if ($rpc_basic_ok = 0) { return 401; }
  limit_req_status 429;
  mirror /__rpc_mirror;
  mirror_request_body on;
  limit_req zone=rpc_basic burst=40 nodelay;
  proxy_pass http://dcai_rpc_ws;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
  proxy_read_timeout 86400;
  rewrite "^/ws/basic/[0-9a-fA-F]{32}/(.*)$" /$1 break;
}

